[server]
bind = "127.0.0.1:3000"
metrics_bind = "127.0.0.1:9090"
trusted_proxies = []

[dns]
resolvers = ["cloudflare"]
timeout_ms = 5000

[dnsbl]
zones = [
  "zen.spamhaus.org",
  "b.barracudacentral.org",
  "bl.spamcop.net",
  "dbl.spamhaus.org",
]
timeout_ms = 2000

[http]
timeout_ms = 10000

[rate_limit]
per_ip = "10/min"

# [enrichment]
# ip_url = "http://localhost:3001"
# timeout_ms = 5000

[dkim]
max_user_selectors = 5

[telemetry]
log_format = "json"
service_name = "beacon"
sample_rate = 1.0

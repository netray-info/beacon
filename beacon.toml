[server]
bind = "127.0.0.1:8084"
metrics_bind = "127.0.0.1:9094"
trusted_proxies = []

[dns]
resolvers = ["cloudflare"]
timeout_ms = 5000

[dnsbl]
zones = [
  "zen.spamhaus.org",
  "b.barracudacentral.org",
  "bl.spamcop.net",
  "dbl.spamhaus.org",
]
timeout_ms = 2000

[http]
timeout_ms = 10000

[rate_limit]
per_ip = "10/min"

